services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/workspace
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Deploy block is the Compose V2 way to request GPU resources.
    # This is equivalent to `runtime: nvidia` and works with both
    # `docker compose` (V2) and `docker-compose` (V1, legacy).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute, utility]
